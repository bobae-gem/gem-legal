<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사건 관리실 — 보배 법률전략실</title>
<style>
:root{--bg:#070910;--sur:#0d1017;--sur2:#121620;--sur3:#181d28;--bdr:#222a3a;--bdr2:#1a2030;--acc:#4d7aff;--acc2:#7a4dff;--red:#ff3a3a;--org:#ff8822;--yel:#ffcc22;--grn:#22ffaa;--tel:#22ccff;--txt:#edf0ff;--txt2:#8492b0;--txt3:#424f68}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Malgun Gothic',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;font-size:13px}
nav{display:flex;align-items:center;padding:0 20px;height:52px;background:var(--sur);border-bottom:1px solid var(--bdr);gap:3px;position:sticky;top:0;z-index:100;overflow-x:auto}
.nlogo{font-size:14px;font-weight:900;color:var(--txt);margin-right:12px;white-space:nowrap;text-decoration:none;cursor:pointer}.nlogo:hover{opacity:.8}.nlogo span{color:var(--acc)}
a.nl{text-decoration:none;color:var(--txt3);font-size:12px;font-weight:700;padding:5px 10px;border-radius:7px;transition:all .15s;border:1px solid transparent;white-space:nowrap;flex-shrink:0}
a.nl:hover{color:var(--txt2);background:var(--sur2)}a.nl.on{color:var(--acc);background:#4d7aff14;border-color:#4d7aff30}
.nr{margin-left:auto;white-space:nowrap;font-size:12px;color:var(--txt3);padding-left:10px}

.layout{display:grid;grid-template-columns:260px 1fr;height:calc(100vh - 88px)}

/* 사이드바 */
.sidebar{background:var(--sur);border-right:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden}
.sb-head{padding:14px 16px 12px;border-bottom:1px solid var(--bdr2);display:flex;align-items:center;justify-content:space-between}
.sb-title{font-size:14px;font-weight:900}
.case-list{flex:1;overflow-y:auto;padding:10px}
.case-item{padding:10px 12px;border-radius:10px;cursor:pointer;margin-bottom:6px;border:1px solid transparent;transition:all .15s;background:var(--sur2)}
.case-item:hover{border-color:var(--bdr)}
.case-item.active{border-color:var(--acc);background:#4d7aff0c}
.ci-name{font-size:13px;font-weight:800;color:var(--txt);margin-bottom:3px}
.ci-status{font-size:11px;color:var(--txt3)}
.ci-risk{display:inline-block;font-size:10px;font-weight:800;padding:2px 7px;border-radius:4px;margin-top:4px}
.crh{background:#ff3a3a18;color:#ff5555;border:1px solid #ff3a3a30}
.crm{background:#ffcc2218;color:#ffdd55;border:1px solid #ffcc2230}
.crl{background:#22ffaa18;color:#44ffbb;border:1px solid #22ffaa30}
.sb-empty{padding:24px;text-align:center;color:var(--txt3);font-size:12px}

/* 메인 */
.main{display:flex;flex-direction:column;overflow:hidden}
.no-case{display:flex;align-items:center;justify-content:center;flex-direction:column;flex:1;gap:12px;color:var(--txt3)}
.no-case-ico{font-size:40px;opacity:.3}

/* 탭 */
.tab-bar{display:flex;gap:0;border-bottom:1px solid var(--bdr2);background:var(--sur);flex-shrink:0;overflow-x:auto}
.tab-btn{padding:12px 16px;font-size:12px;font-weight:700;color:var(--txt3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:6px}
.tab-btn:hover{color:var(--txt2)}
.tab-btn.on{color:var(--txt);border-bottom-color:var(--acc)}
.tab-cnt{font-size:10px;font-weight:800;padding:1px 6px;border-radius:8px;background:var(--sur2);color:var(--txt3)}
.tab-cnt.has{background:#4d7aff18;color:var(--acc)}

/* 탭 컨텐츠 */
.tab-content{flex:1;overflow-y:auto;padding:16px 20px}
.tab-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.tab-info{font-size:11px;color:var(--txt3);line-height:1.5;background:var(--sur2);border-radius:7px;padding:8px 11px;border:1px solid var(--bdr2);margin-bottom:12px}

/* 항목 카드 */
.fact-card{background:var(--sur);border:1px solid var(--bdr);border-radius:11px;padding:13px 15px;margin-bottom:8px;transition:border-color .15s;position:relative}
.fact-card:hover{border-color:var(--bdr)}
.fc-top{display:flex;align-items:center;gap:7px;margin-bottom:8px;flex-wrap:wrap}
.fc-type{font-size:10px;font-weight:800;padding:3px 9px;border-radius:5px;letter-spacing:.3px}

/* 타입별 색상 */
.ft-confirmed{background:#22ffaa18;color:#33ffaa;border:1px solid #22ffaa30}
.ft-disputed{background:#ff882218;color:#ffaa44;border:1px solid #ff882230}
.ft-user{background:#4d7aff18;color:#7a9fff;border:1px solid #4d7aff30}
.ft-opponent{background:#ff3a3a18;color:#ff6666;border:1px solid #ff3a3a30}
.ft-doc{background:#7a4dff18;color:#aa7fff;border:1px solid #7a4dff30}
.ft-evidence{background:#22ccff18;color:#44ddff;border:1px solid #22ccff30}

/* 신뢰도 */
.fc-conf{display:flex;align-items:center;gap:6px;margin-left:auto}
.fc-conf-pct{font-size:11px;font-weight:800}
.conf-h{color:#22ffaa}.conf-m{color:#ffcc22}.conf-l{color:#ff3a3a}
.fc-title{font-size:13px;font-weight:800;color:var(--txt);margin-bottom:4px;line-height:1.4}
.fc-body{font-size:12px;color:var(--txt2);line-height:1.6;margin-bottom:8px}
.fc-src{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.fc-src-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;background:var(--sur2);color:var(--txt3);border:1px solid var(--bdr2)}
.fc-note{font-size:11px;color:var(--org);background:#ff882210;border-radius:5px;padding:5px 8px;border:1px solid #ff882220;margin-bottom:8px}
.fc-actions{display:flex;gap:6px}

/* 버튼 */
.btn{padding:6px 13px;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;border:none;transition:all .15s}
.bg{background:var(--sur2);color:var(--txt2);border:1px solid var(--bdr)}.bg:hover{border-color:var(--acc);color:var(--acc)}
.bp{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff}.bp:hover{opacity:.85}
.br{background:#ff3a3a12;color:var(--red);border:1px solid #ff3a3a28}.br:hover{background:#ff3a3a20}
.sm{padding:5px 10px;font-size:11px}

.empty{text-align:center;padding:36px;color:var(--txt3);font-size:12px;font-weight:600}
.empty-ico{font-size:28px;opacity:.3;margin-bottom:8px}

/* 모달 */
.mbg{display:none;position:fixed;inset:0;background:#00000088;z-index:200;align-items:center;justify-content:center}
.mbg.open{display:flex}
.modal{background:var(--sur);border:1px solid var(--bdr);border-radius:14px;padding:22px;width:520px;max-width:92vw;max-height:88vh;overflow-y:auto}
.mtit{font-size:15px;font-weight:900;margin-bottom:14px}
.f{margin-bottom:11px}
.f label{display:block;font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt3);margin-bottom:5px}
.f input,.f select,.f textarea{width:100%;background:var(--sur2);border:1px solid var(--bdr);border-radius:8px;padding:8px 11px;color:var(--txt);font-size:12px;font-weight:600;outline:none;transition:border-color .15s;font-family:inherit}
.f input:focus,.f select:focus,.f textarea:focus{border-color:var(--acc)}
.f select option{background:var(--sur2)}.f textarea{resize:vertical;min-height:80px}
.mbtns{display:flex;gap:7px;margin-top:16px;justify-content:flex-end}

.subnav{display:flex;align-items:center;gap:10px;padding:0 20px;height:36px;background:#0a0c12;border-bottom:1px solid #ff3a3a22;flex-shrink:0;position:sticky;top:52px;z-index:99}
.snl{text-decoration:none;color:#ff6666;font-size:12px;font-weight:800;padding:4px 12px;border-radius:6px;border:1px solid #ff3a3a28;background:#ff3a3a12;white-space:nowrap;transition:all .15s}
.snl:hover{background:#ff3a3a20}.snl.on{background:#ff3a3a22;border-color:#ff3a3a40}
.sn-arr{color:#ff3a3a55;font-size:11px;font-weight:700}
.sn-flow{display:flex;align-items:center;gap:6px}
.sn-desc{font-size:11px;color:#424f68;font-weight:600;margin-left:8px}
</style>
</head>
<body>
<nav>
  <a href="상담실.html" class="nlogo">보배 <span>법률전략실</span></a>
  <a href="상황실.html" class="nl">🔴 메인 상황실</a>
  <a href="상담실.html" class="nl">💬 법률 상담실</a>
  <a href="업데이터.html" class="nl">🤖 상황실 업데이터</a>
  <a href="사건.html" class="nl on">📁 사건 관리실</a>
  <a href="검수실.html" class="nl">🛡️ 콘텐츠 검수실</a>
  <a href="리서치.html" class="nl">🔍 리서치 센터</a>
  <a href="대시보드.html" class="nl">📊 시스템구조</a>
  <div class="nr" id="clk">--:--:--</div>
</nav>
<div class="subnav">
  <span class="sn-flow">
    <a href="모니터링.html" class="snl">👁️ 모니터링</a>
    <span class="sn-arr">→</span>
    <a href="분류실.html" class="snl">📋 분류실</a>
    <span class="sn-arr">→</span>
    <a href="증거보존.html" class="snl">📦 증거보존</a>
    <span class="sn-arr">→</span>
    <a href="스케줄러.html" class="snl">⚙️ 스케줄러</a>
  </span>
  <span style="color:#ff3a3a33;margin:0 8px;font-size:14px;font-weight:100">|</span>
  <a href="메모리.html" class="snl">🧠 메모리</a>
</div>

<div class="layout">
  <!-- 사이드바: 사건 목록 -->
  <div class="sidebar">
    <div class="sb-head">
      <div class="sb-title">사건 목록</div>
      <button class="btn bp sm" onclick="openCaseModal()">+ 등록</button>
    </div>
    <div class="case-list" id="case-list">
      <div class="sb-empty">등록된 사건이 없습니다</div>
    </div>
  </div>

  <!-- 메인: 사건 상세 -->
  <div class="main" id="main-area">
    <div class="no-case">
      <div class="no-case-ico">⚖️</div>
      <div style="font-size:14px;font-weight:700">사건을 선택하거나 등록하세요</div>
    </div>
  </div>
</div>

<!-- 사건 등록 모달 -->
<div class="mbg" id="m-case" onclick="if(event.target===this)closeModal('case')">
  <div class="modal">
    <div class="mtit">⚖️ 사건 등록</div>
    <div class="f"><label>사건번호</label><input id="cn" placeholder="예: 2026나529"></div>
    <div class="f"><label>사건명</label><input id="cn2" placeholder="예: 서정은 vs 황철순"></div>
    <div class="f"><label>법원</label><input id="cc" placeholder="예: 서울중앙지방법원"></div>
    <div class="f"><label>진행 단계</label>
      <select id="cs"><option>항소심 진행 중</option><option>1심 진행 중</option><option>판결 대기</option><option>준비서면 작성 중</option><option>조정/합의 중</option><option>수사 단계</option><option>종결</option></select>
    </div>
    <div class="f"><label>위험도</label>
      <select id="cr"><option value="low">낮음</option><option value="mid" selected>중간</option><option value="high">높음</option></select>
    </div>
    <div class="mbtns">
      <button class="btn bg" onclick="closeModal('case')">취소</button>
      <button class="btn bp" onclick="addCase()">등록</button>
    </div>
  </div>
</div>

<!-- 항목 추가 모달 -->
<div class="mbg" id="m-item" onclick="if(event.target===this)closeModal('item')">
  <div class="modal">
    <div class="mtit" id="item-modal-title">항목 추가</div>
    <div class="f"><label>제목</label><input id="it-title" placeholder="항목 제목"></div>
    <div class="f"><label>내용</label><textarea id="it-body" placeholder="상세 내용..."></textarea></div>
    <div class="f"><label>출처 (쉼표로 구분)</label><input id="it-src" placeholder="예: 판결문, 사용자 진술, 갑14호증"></div>
    <div class="f"><label>AI 신뢰도 (0~100)</label><input id="it-conf" type="number" min="0" max="100" placeholder="예: 90"></div>
    <div class="f"><label>비고 (선택)</label><input id="it-note" placeholder="예: 추가 확인 필요"></div>
    <div class="mbtns">
      <button class="btn bg" onclick="closeModal('item')">취소</button>
      <button class="btn bp" onclick="saveItem()">저장</button>
    </div>
  </div>
</div>

<script>
setInterval(()=>{ document.getElementById('clk').textContent = new Date().toLocaleTimeString('ko-KR',{hour12:false}); },1000);

const TABS = [
  { id:'confirmed', label:'✅ 확정 사실', css:'ft-confirmed',
    desc:'판결문·전자소송·공식 서면으로 확인된 사실. 법원이 인정한 사실관계만 포함.' },
  { id:'disputed',  label:'⚡ 다투는 사실', css:'ft-disputed',
    desc:'아직 법적으로 확정되지 않은 사실. 양측이 각자 다르게 주장하는 부분.' },
  { id:'user',      label:'👤 사용자 주장', css:'ft-user',
    desc:'우리 측(피항소인)이 주장하는 내용. 확정 사실이 아님 — 법원이 인정해야 확정.' },
  { id:'opponent',  label:'🔴 상대방 주장', css:'ft-opponent',
    desc:'상대방(항소인)이 주장하는 내용. 사실 여부 미확인 — 반박 준비 필요.' },
  { id:'doc',       label:'📜 공식 문서', css:'ft-doc',
    desc:'법원·기관이 발행한 공식 문서. 판결문, 항소이유서, 답변서, 전자소송 기록.' },
  { id:'evidence',  label:'📸 증거', css:'ft-evidence',
    desc:'제출된 증거 목록. 갑·을 호증 번호, 증거 종류, 강도 포함.' },
];

let cases = JSON.parse(localStorage.getItem('case_data')||'[]');
let currentCase = null;
let currentTab = 'confirmed';
let addingTab = 'confirmed';

function save(){ localStorage.setItem('case_data', JSON.stringify(cases)); }
function ts(){ return new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'numeric',day:'numeric'}); }

function renderCaseList(){
  const el = document.getElementById('case-list');
  if(!cases.length){ el.innerHTML='<div class="sb-empty">등록된 사건이 없습니다</div>'; return; }
  el.innerHTML = cases.map((c,i)=>`
    <div class="case-item${currentCase&&currentCase.id===c.id?' active':''}" onclick="selectCase(${i})">
      <div class="ci-name">${c.casenum} ${c.name}</div>
      <div class="ci-status">${c.court} · ${c.status}</div>
      <span class="ci-risk ${c.risk==='high'?'crh':c.risk==='low'?'crl':'crm'}">${c.risk==='high'?'높음':c.risk==='low'?'낮음':'중간'}</span>
    </div>`).join('');
}

function selectCase(i){
  currentCase = cases[i];
  renderCaseList();
  renderCaseDetail();
}

function renderCaseDetail(){
  if(!currentCase){ document.getElementById('main-area').innerHTML='<div class="no-case"><div class="no-case-ico">⚖️</div><div style="font-size:14px;font-weight:700">사건을 선택하거나 등록하세요</div></div>'; return; }
  const c = currentCase;
  const tabBar = TABS.map(t=>{
    const cnt = (c.items||{})[t.id]?.length||0;
    return `<div class="tab-btn${currentTab===t.id?' on':''}" onclick="switchTab('${t.id}')">${t.label}<span class="tab-cnt${cnt>0?' has':''}">${cnt}</span></div>`;
  }).join('');

  const tabDef = TABS.find(t=>t.id===currentTab);
  const items = (c.items||{})[currentTab]||[];

  const cardsHtml = items.length
    ? items.map((it,i)=>{
        const conf = it.confidence;
        const confClass = conf>=70?'conf-h':conf>=50?'conf-m':'conf-l';
        const srcs = Array.isArray(it.sources) ? it.sources : (it.source?[it.source]:[]);
        return `<div class="fact-card">
          <div class="fc-top">
            <span class="fc-type ${tabDef.css}">${tabDef.label.replace(/^[^\s]+\s/,'')}</span>
            ${conf!=null?`<div class="fc-conf"><span class="fc-conf-pct ${confClass}">신뢰도 ${conf}%</span></div>`:''}
          </div>
          <div class="fc-title">${it.title}</div>
          <div class="fc-body">${it.body}</div>
          ${srcs.length?`<div class="fc-src">${srcs.map(s=>`<span class="fc-src-tag">${s}</span>`).join('')}</div>`:''}
          ${it.note?`<div class="fc-note">⚠️ ${it.note}</div>`:''}
          <div class="fc-actions">
            <button class="btn br sm" onclick="delItem('${currentTab}',${i})">삭제</button>
          </div>
        </div>`;
      }).join('')
    : `<div class="empty"><div class="empty-ico">${tabDef.label.split(' ')[0]}</div>등록된 항목이 없습니다<br><span style="font-size:11px;margin-top:4px;display:block">${tabDef.desc}</span></div>`;

  document.getElementById('main-area').innerHTML = `
    <div style="padding:14px 20px;border-bottom:1px solid var(--bdr2);background:var(--sur);display:flex;align-items:center;justify-content:space-between;flex-shrink:0">
      <div>
        <div style="font-size:16px;font-weight:900">${c.casenum} ${c.name}</div>
        <div style="font-size:11px;color:var(--txt3);margin-top:2px">${c.court} · ${c.status}</div>
      </div>
      <div style="display:flex;gap:7px">
        <button class="btn bg sm" onclick="openItemModal('${currentTab}')">+ 항목 추가</button>
        <button class="btn br sm" onclick="delCase()">사건 삭제</button>
      </div>
    </div>
    <div class="tab-bar">${tabBar}</div>
    <div class="tab-content">
      <div class="tab-info">${tabDef.desc}</div>
      ${cardsHtml}
    </div>`;
}

function switchTab(tab){
  currentTab = tab;
  renderCaseDetail();
}

function openCaseModal(){ document.getElementById('m-case').classList.add('open'); setTimeout(()=>document.getElementById('cn').focus(),80); }
function closeModal(id){ document.getElementById('m-'+id).classList.remove('open'); }

function addCase(){
  const casenum = document.getElementById('cn').value.trim();
  const name = document.getElementById('cn2').value.trim();
  if(!casenum&&!name){ alert('사건번호 또는 사건명을 입력하세요'); return; }
  const c = {
    id: 'c'+Date.now(),
    casenum, name,
    court: document.getElementById('cc').value,
    status: document.getElementById('cs').value,
    risk: document.getElementById('cr').value,
    items: {confirmed:[],disputed:[],user:[],opponent:[],doc:[],evidence:[]},
    created: ts()
  };
  cases.unshift(c);
  save();
  closeModal('case');
  document.getElementById('cn').value='';
  document.getElementById('cn2').value='';
  document.getElementById('cc').value='';
  selectCase(0);
}

function delCase(){
  if(!currentCase||!confirm('이 사건을 삭제하시겠습니까?')) return;
  cases = cases.filter(c=>c.id!==currentCase.id);
  currentCase = null;
  save();
  renderCaseList();
  renderCaseDetail();
}

function openItemModal(tab){
  addingTab = tab;
  const tabDef = TABS.find(t=>t.id===tab);
  document.getElementById('item-modal-title').textContent = tabDef.label + ' 항목 추가';
  document.getElementById('it-title').value='';
  document.getElementById('it-body').value='';
  document.getElementById('it-src').value='';
  document.getElementById('it-conf').value='';
  document.getElementById('it-note').value='';
  document.getElementById('m-item').classList.add('open');
  setTimeout(()=>document.getElementById('it-title').focus(),80);
}

function saveItem(){
  if(!currentCase) return;
  const title = document.getElementById('it-title').value.trim();
  if(!title){ alert('제목을 입력하세요'); return; }
  const srcRaw = document.getElementById('it-src').value;
  const conf = document.getElementById('it-conf').value;
  const item = {
    id: 'i'+Date.now(),
    title,
    body: document.getElementById('it-body').value,
    sources: srcRaw ? srcRaw.split(',').map(s=>s.trim()).filter(Boolean) : [],
    confidence: conf ? parseInt(conf) : null,
    note: document.getElementById('it-note').value,
    time: ts()
  };
  if(!currentCase.items) currentCase.items={confirmed:[],disputed:[],user:[],opponent:[],doc:[],evidence:[]};
  if(!currentCase.items[addingTab]) currentCase.items[addingTab]=[];
  currentCase.items[addingTab].unshift(item);
  // cases 배열 업데이트
  const idx = cases.findIndex(c=>c.id===currentCase.id);
  if(idx>=0) cases[idx]=currentCase;
  save();
  closeModal('item');
  renderCaseDetail();
}

function delItem(tab, i){
  if(!currentCase) return;
  currentCase.items[tab].splice(i,1);
  const idx = cases.findIndex(c=>c.id===currentCase.id);
  if(idx>=0) cases[idx]=currentCase;
  save();
  renderCaseDetail();
}

document.addEventListener('keydown',e=>{ if(e.key==='Escape'){closeModal('case');closeModal('item');} });
