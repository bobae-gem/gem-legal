<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">

<title>구성원 소개 — 보배 법률전략실</title>
<style>
:root {
  --bg: #080a0f;
  --surface: #0e1118;
  --surface2: #141820;
  --surface3: #1a1f2e;
  --border: #252d40;
  --border2: #1e2535;
  --accent: #5a8aff;
  --text: #eef0ff;
  --text2: #8895b0;
  --text3: #4a566e;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
}

nav {
  display: flex; align-items: center;
  padding: 0 20px; height: 52px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  gap: 3px; position: sticky; top: 0; z-index: 100; overflow-x: auto;
}
.nav-logo { font-size: 14px; font-weight: 900; color: var(--text); margin-right: 12px; white-space: nowrap; flex-shrink: 0; }
.nav-logo span { color: var(--accent); }
.nav-link {
  text-decoration: none; color: var(--text3); font-size: 12px; font-weight: 700;
  padding: 5px 10px; border-radius: 7px; transition: all 0.15s; border: 1px solid transparent; white-space: nowrap; flex-shrink: 0;
}
.nav-link:hover { color: var(--text2); background: var(--surface2); }
.nav-link.active { color: var(--accent); background: #5a8aff12; border-color: #5a8aff28; }
.nav-right { margin-left: auto; white-space: nowrap; padding-left: 10px; flex-shrink: 0; }
.live-dot { width: 8px; height: 8px; border-radius: 50%; background: #33ffaa; box-shadow: 0 0 8px #33ffaa; animation: pulse 2s infinite; display: inline-block; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

.page-header {
  padding: 36px 40px 28px;
  border-bottom: 1px solid var(--border2);
}
.page-title { font-size: 28px; font-weight: 900; letter-spacing: -0.5px; }
.page-title span { color: var(--accent); }
.page-sub { font-size: 14px; color: var(--text3); margin-top: 6px; font-weight: 500; }

.stats-row {
  display: flex;
  gap: 20px;
  padding: 24px 40px;
  border-bottom: 1px solid var(--border2);
}
.stat {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 14px;
  padding: 20px 28px;
  text-align: center;
  min-width: 120px;
}
.stat-num { font-size: 40px; font-weight: 900; color: var(--accent); line-height: 1; margin-bottom: 6px; }
.stat-label { font-size: 13px; font-weight: 600; color: var(--text2); }

.content { padding: 32px 40px 60px; }

.team-section {
  margin-bottom: 52px;
}
.team-header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 2px solid var(--border);
}
.team-icon {
  width: 52px; height: 52px;
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
  flex-shrink: 0;
}
.team-info { flex: 1; }
.team-name { font-size: 22px; font-weight: 900; color: var(--text); }
.team-stage { font-size: 12px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 3px; }
.team-desc { font-size: 14px; color: var(--text2); font-weight: 500; margin-top: 3px; }
.team-count-badge {
  font-size: 14px;
  font-weight: 800;
  padding: 7px 16px;
  border-radius: 20px;
  flex-shrink: 0;
}

.agents-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 14px;
}
.agent-card {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 14px;
  padding: 20px;
  transition: transform 0.15s, border-color 0.15s;
  position: relative;
  overflow: hidden;
}
.agent-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--team-color);
}
.agent-card:hover {
  transform: translateY(-2px);
  border-color: var(--team-color);
}
.agent-num-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 26px; height: 26px;
  border-radius: 7px;
  font-size: 12px;
  font-weight: 800;
  margin-bottom: 10px;
  background: color-mix(in srgb, var(--team-color) 15%, transparent);
  color: var(--team-color);
  border: 1px solid color-mix(in srgb, var(--team-color) 30%, transparent);
}
.agent-name { font-size: 17px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
.agent-role { font-size: 13px; color: var(--text2); font-weight: 500; line-height: 1.5; }
.agent-tag {
  display: inline-block;
  font-size: 11px;
  font-weight: 700;
  padding: 3px 9px;
  border-radius: 6px;
  margin-top: 10px;
  background: color-mix(in srgb, var(--team-color) 12%, transparent);
  color: var(--team-color);
  border: 1px solid color-mix(in srgb, var(--team-color) 25%, transparent);
}

/* team color vars injected inline */

.subnav{display:flex;align-items:center;gap:10px;padding:0 20px;height:36px;background:#0a0c12;border-bottom:1px solid #ff3a3a22;flex-shrink:0;position:sticky;top:52px;z-index:99}
.snl{text-decoration:none;color:#ff6666;font-size:12px;font-weight:800;padding:4px 12px;border-radius:6px;border:1px solid #ff3a3a28;background:#ff3a3a12;white-space:nowrap;transition:all .15s}
.snl:hover{background:#ff3a3a20}.snl.on{background:#ff3a3a22;border-color:#ff3a3a40}
.sn-arr{color:#ff3a3a55;font-size:11px;font-weight:700}
.sn-flow{display:flex;align-items:center;gap:6px}
.sn-desc{font-size:11px;color:#424f68;font-weight:600;margin-left:8px}
</style>
</head>
