<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>콘텐츠 검수실 — 보배 법률전략실</title>
<style>
:root{--bg:#070910;--sur:#0d1017;--sur2:#121620;--sur3:#181d28;--bdr:#222a3a;--bdr2:#1a2030;--acc:#4d7aff;--acc2:#7a4dff;--red:#ff3a3a;--org:#ff8822;--yel:#ffcc22;--grn:#22ffaa;--txt:#edf0ff;--txt2:#8492b0;--txt3:#424f68}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Malgun Gothic',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;font-size:13px}
nav{display:flex;align-items:center;padding:0 24px;height:52px;background:var(--sur);border-bottom:1px solid var(--bdr);gap:4px;position:sticky;top:0;z-index:100;flex-wrap:nowrap;overflow-x:auto}
.nlogo{font-size:14px;font-weight:900;color:var(--txt);margin-right:14px;white-space:nowrap}.nlogo span{color:var(--acc)}
a.nl{text-decoration:none;color:var(--txt3);font-size:12px;font-weight:700;padding:5px 10px;border-radius:7px;transition:all .15s;border:1px solid transparent;white-space:nowrap}
a.nl:hover{color:var(--txt2);background:var(--sur2)}a.nl.on{color:var(--acc);background:#4d7aff12;border-color:#4d7aff28}
.nr{margin-left:auto;white-space:nowrap;font-size:12px;color:var(--txt3);padding-left:12px}
.page{display:grid;grid-template-columns:1fr 1fr;gap:0;height:calc(100vh - 88px)}
.left-panel{border-right:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden}
.right-panel{display:flex;flex-direction:column;overflow:hidden}
.ph{padding:14px 20px;border-bottom:1px solid var(--bdr2);display:flex;align-items:center;justify-content:space-between;background:var(--sur)}
.ph-title{font-size:14px;font-weight:900}
.ph-sub{font-size:11px;color:var(--txt3);margin-top:2px}
.btn{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:none;transition:all .15s}
.bg{background:var(--sur2);color:var(--txt2);border:1px solid var(--bdr)}.bg:hover{border-color:var(--acc);color:var(--acc)}
.bp{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff}.bp:hover{opacity:.85}
.br{background:#ff3a3a12;color:var(--red);border:1px solid #ff3a3a28}
.sm{padding:5px 10px;font-size:11px}
.pb{flex:1;overflow-y:auto;padding:16px 20px}

.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.type-btn{padding:10px;border-radius:9px;border:1px solid var(--bdr2);background:var(--sur2);color:var(--txt2);font-size:12px;font-weight:700;cursor:pointer;text-align:center;transition:all .15s}
.type-btn:hover{border-color:var(--acc);color:var(--acc)}
.type-btn.on{border-color:var(--acc);background:#4d7aff12;color:var(--acc)}

.f{margin-bottom:12px}
.f label{display:block;font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt3);margin-bottom:5px}
.f textarea{width:100%;background:var(--sur2);border:1px solid var(--bdr);border-radius:9px;padding:10px 12px;color:var(--txt);font-size:12px;font-weight:500;outline:none;transition:border-color .15s;resize:vertical;min-height:120px;font-family:inherit;line-height:1.6}
.f textarea:focus{border-color:var(--acc)}
.f input{width:100%;background:var(--sur2);border:1px solid var(--bdr);border-radius:9px;padding:8px 12px;color:var(--txt);font-size:12px;font-weight:500;outline:none;transition:border-color .15s}
.f input:focus{border-color:var(--acc)}

/* 결과 */
.overall{display:flex;align-items:center;justify-content:space-between;background:var(--sur2);border-radius:11px;padding:14px 16px;margin-bottom:14px;border:1px solid var(--bdr2)}
.ov-label{font-size:12px;font-weight:700;color:var(--txt2)}
.ov-score{font-size:24px;font-weight:900}
.ov-low{color:var(--grn)}.ov-mid{color:var(--yel)}.ov-high{color:var(--org)}.ov-danger{color:var(--red)}
.ov-tag{font-size:12px;font-weight:800;padding:5px 14px;border-radius:8px}

.check-item{display:flex;gap:10px;background:var(--sur2);border-radius:10px;padding:11px 13px;margin-bottom:7px;border:1px solid var(--bdr2)}
.ci-left{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0}
.ci-ico{font-size:16px}
.ci-result{font-size:10px;font-weight:800;padding:2px 6px;border-radius:4px}
.cr-ok{background:#22ffaa18;color:#44ffbb}.cr-warn{background:#ffcc2218;color:#ffdd55}.cr-danger{background:#ff3a3a18;color:#ff6666}
.ci-right{flex:1}
.ci-name{font-size:12px;font-weight:800;color:var(--txt);margin-bottom:3px}
.ci-desc{font-size:11px;color:var(--txt2);line-height:1.5}
.ci-fix{font-size:11px;color:var(--org);margin-top:4px;padding:5px 8px;background:#ff882210;border-radius:5px;border:1px solid #ff882228}

.history-item{background:var(--sur2);border:1px solid var(--bdr2);border-radius:9px;padding:10px 12px;margin-bottom:7px;cursor:pointer;transition:border-color .15s}
.history-item:hover{border-color:var(--acc)}
.hi-top{display:flex;align-items:center;gap:7px;margin-bottom:4px}
.hi-type{font-size:10px;font-weight:800;padding:2px 7px;border-radius:5px;background:#4d7aff18;color:var(--acc);border:1px solid #4d7aff28}
.hi-time{font-size:10px;color:var(--txt3);margin-left:auto}
.hi-title{font-size:12px;font-weight:700;color:var(--txt2)}
.hi-risk{font-size:10px;font-weight:800;padding:2px 7px;border-radius:5px}

.empty{text-align:center;padding:32px;color:var(--txt3);font-size:12px;font-weight:600}
.tab-row{display:flex;gap:6px;padding:12px 20px;border-bottom:1px solid var(--bdr2);background:var(--sur)}
.tab{padding:5px 12px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;color:var(--txt3);border:1px solid transparent;transition:all .15s}
.tab:hover{color:var(--txt2)}.tab.on{color:var(--acc);background:#4d7aff12;border-color:#4d7aff28}

.subnav{display:flex;align-items:center;gap:10px;padding:0 20px;height:36px;background:#0a0c12;border-bottom:1px solid #ff3a3a22;flex-shrink:0;position:sticky;top:52px;z-index:99}
.snl{text-decoration:none;color:#ff6666;font-size:12px;font-weight:800;padding:4px 12px;border-radius:6px;border:1px solid #ff3a3a28;background:#ff3a3a12;white-space:nowrap;transition:all .15s}
.snl:hover{background:#ff3a3a20}.snl.on{background:#ff3a3a22;border-color:#ff3a3a40}
.sn-arr{color:#ff3a3a55;font-size:11px;font-weight:700}
.sn-flow{display:flex;align-items:center;gap:6px}
.sn-desc{font-size:11px;color:#424f68;font-weight:600;margin-left:8px}
</style>
</head>
<body>
<nav>
    <a href="상담실.html" class="nlogo">보배 <span>법률전략실</span></a>
  <a href="상황실.html" class="nl">🔴 메인 상황실</a>
  <a href="상담실.html" class="nl">💬 법률 상담실</a>
  <a href="업데이터.html" class="nl">🤖 상황실 업데이터</a>
  <a href="사건.html" class="nl">📁 사건 관리실</a>
  <a href="검수실.html" class="nl on">🛡️ 콘텐츠 검수실</a>
  <a href="리서치.html" class="nl">🔍 리서치 센터</a>
  <a href="메모리.html" class="nl">🧠 메모리 관리실</a>

<div class="nr" id="clk">--:--:--</div>
</nav>
<div class="subnav">
  <span class="sn-flow">
    <a href="스케줄러.html" class="snl">⚙️ 스케줄러</a>
    <span class="sn-arr">→</span>

    <span class="sn-arr">→</span>
    <a href="분류실.html" class="snl">📋 분류실</a>

<div class="page">
  <!-- 왼쪽: 입력 -->
  <div class="left-panel">
    <div class="ph">
      <div><div class="ph-title">콘텐츠 검수실</div><div class="ph-sub">업로드 전 법적 리스크 체크</div></div>
      <button class="btn br sm" onclick="clearAll()">초기화</button>
    </div>
    <div class="pb">
      <div class="f"><label>콘텐츠 유형</label>
        <div class="type-grid">
          <div class="type-btn on" onclick="setType(this,'유튜브 영상')">📹 유튜브 영상</div>
          <div class="type-btn" onclick="setType(this,'쇼츠/릴스')">⚡ 쇼츠/릴스</div>
          <div class="type-btn" onclick="setType(this,'자막/스크립트')">📝 자막/스크립트</div>
          <div class="type-btn" onclick="setType(this,'썸네일')">🖼️ 썸네일</div>
          <div class="type-btn" onclick="setType(this,'라이브 멘트')">📡 라이브 멘트</div>
          <div class="type-btn" onclick="setType(this,'SNS 게시물')">💬 SNS 게시물</div>
          <div class="type-btn" onclick="setType(this,'댓글/DM')">✉️ 댓글/DM</div>
          <div class="type-btn" onclick="setType(this,'해명문')">📋 해명문</div>
        </div>
      </div>
      <div class="f"><label>제목/주제</label><input id="inp-title" placeholder="예: '그날의 진실' 영상 제목"></div>
      <div class="f"><label>검수할 내용</label><textarea id="inp-content" placeholder="자막, 멘트, 게시글 내용을 붙여넣으세요...&#10;&#10;특정인 언급, 사건 관련 표현, 감정적 표현 포함 여부를 분석합니다."></textarea></div>
      <div class="f"><label>추가 맥락 (선택)</label><textarea id="inp-context" placeholder="예: 현재 소송 진행 중, 상대방은 황철순..." style="min-height:60px"></textarea></div>
      <button class="btn bp" style="width:100%;padding:11px" onclick="runCheck()">🛡️ 법적 리스크 검수 시작</button>
    </div>
  </div>

  <!-- 오른쪽: 결과 -->
  <div class="right-panel">
    <div class="tab-row">
      <div class="tab on" onclick="switchTab('result',this)">검수 결과</div>
      <div class="tab" onclick="switchTab('history',this)">검수 기록</div>
    </div>

    <!-- 결과 탭 -->
    <div id="tab-result" class="pb">
      <div id="result-area">
        <div class="empty">
          <div style="font-size:32px;opacity:.3;margin-bottom:10px">🛡️</div>
          왼쪽에 내용을 입력하고<br>검수 시작을 눌러주세요
        </div>
      </div>
    </div>

    <!-- 기록 탭 -->
    <div id="tab-history" class="pb" style="display:none">
      <div id="history-area">
        <div class="empty">검수 기록이 없습니다</div>
      </div>
    </div>
  </div>
</div>

<script>
let currentType = '유튜브 영상';
let history = JSON.parse(localStorage.getItem('review_history')||'[]');

setInterval(()=>{ document.getElementById('clk').textContent = new Date().toLocaleTimeString('ko-KR',{hour12:false}); }, 1000);

function setType(el, type){
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  currentType = type;
}

function switchTab(tab, el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('tab-result').style.display = tab==='result'?'':'none';
  document.getElementById('tab-history').style.display = tab==='history'?'':'none';
  if(tab==='history') renderHistory();
}

const CHECKS = [
  { id:'defamation', name:'명예훼손 위험', ico:'⚖️', desc:'특정인의 사회적 평가를 저하시킬 수 있는 사실 또는 허위사실 적시 여부' },
  { id:'insult', name:'모욕·비방 표현', ico:'🔥', desc:'상대방을 경멸하거나 모욕하는 표현 포함 여부' },
  { id:'privacy', name:'개인정보·초상권', ico:'👤', desc:'동의 없는 개인정보, 얼굴, 사생활 노출 여부' },
  { id:'copyright', name:'저작권 침해', ico:'©️', desc:'음악, 영상, 이미지 등 타인 저작물 무단 사용 여부' },
  { id:'ad', name:'광고·협찬 표기', ico:'📢', desc:'유료 광고·협찬 미표기 또는 부적절한 표기 여부' },
  { id:'evidence', name:'증거화 가능성', ico:'📸', desc:'상대방이 이 콘텐츠를 법적 증거로 활용할 수 있는지' },
  { id:'intention', name:'악의성 판단 위험', ico:'⚠️', desc:'법원이 악의적 의도로 해석할 수 있는 표현 여부' },
  { id:'victim', name:'피해자 특정 가능성', ico:'🎯', desc:'간접적 표현이라도 특정인이 식별될 수 있는지' },
  { id:'platform', name:'플랫폼 정책 위반', ico:'📋', desc:'유튜브·인스타·틱톡 커뮤니티 가이드 위반 여부' },
  { id:'criminal', name:'형사 책임 위험', ico:'🚨', desc:'협박·강요·스토킹 등 형사 처벌 가능 표현 여부' },
];

function runCheck(){
  const content = document.getElementById('inp-content').value.trim();
  const title = document.getElementById('inp-title').value.trim();
  if(!content){ alert('검수할 내용을 입력해주세요.'); return; }

  const results = analyzeContent(content, title);
  const overall = calcOverall(results);
  renderResult(title, content, results, overall);

  // 기록 저장
  history.unshift({ id:'r'+Date.now(), type:currentType, title:title||'(제목 없음)', content:content.slice(0,100), results, overall, time:new Date().toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}) });
  if(history.length > 30) history.pop();
  localStorage.setItem('review_history', JSON.stringify(history));
}

function analyzeContent(content, title){
  const text = (content + ' ' + title).toLowerCase();
  return CHECKS.map(check => {
    let level = 'ok', desc = '위험 요소 없음', fix = '';
    const keywords = {
      defamation: ['마약','거짓말','사기','범죄','전과','불륜','바람','비리','횡령'],
      insult: ['쓰레기','미친','개','놈','년','병신','한심','찌질','역겨','혐오'],
      privacy: ['주소','전화번호','계좌','주민번호','집','사는 곳'],
      evidence: ['복수','후회하게','가만 안 두','끝내주겠','법적으로','신고할'],
      intention: ['혼내','응징','본보기','처벌','망하게','고통'],
      victim: ['그 사람','그녀','저 분','상대방','피고','원고'],
    };
    const found = (keywords[check.id]||[]).filter(k=>text.includes(k));
    if(found.length > 0){
      level = 'danger';
      desc = `위험 키워드 감지: "${found.join('", "')}"`;
      fix = '해당 표현을 삭제하거나 사실 기반의 객관적 표현으로 대체하세요.';
    }
    // 추가 패턴 체크
    if(check.id==='ad' && (text.includes('협찬')||text.includes('광고')||text.includes('sponsored'))) {
      level='warn'; desc='협찬/광고 표현 감지 — 표기 방식 확인 필요';
    }
    if(check.id==='copyright' && (text.includes('bgm')||text.includes('음악')||text.includes('노래'))) {
      level='warn'; desc='음악/BGM 사용 감지 — 라이선스 확인 필요'; fix='저작권 무료 음원 사용 또는 라이선스 확인 후 사용';
    }
    return { ...check, level, result_desc: desc, fix };
  });
}

function calcOverall(results){
  const dangers = results.filter(r=>r.level==='danger').length;
  const warns = results.filter(r=>r.level==='warn').length;
  if(dangers >= 3) return {score:'위험', cls:'ov-danger', tag:'업로드 중단', tagbg:'background:#ff3a3a18;color:#ff6666;border:1px solid #ff3a3a28'};
  if(dangers >= 1) return {score:'주의', cls:'ov-high', tag:'수정 후 업로드', tagbg:'background:#ff882218;color:#ffaa55;border:1px solid #ff882228'};
  if(warns >= 2) return {score:'검토', cls:'ov-mid', tag:'확인 권장', tagbg:'background:#ffcc2218;color:#ffdd55;border:1px solid #ffcc2228'};
  return {score:'안전', cls:'ov-low', tag:'업로드 가능', tagbg:'background:#22ffaa18;color:#44ffbb;border:1px solid #22ffaa28'};
}

function renderResult(title, content, results, overall){
  const dangers = results.filter(r=>r.level==='danger').length;
  const warns = results.filter(r=>r.level==='warn').length;
  document.getElementById('result-area').innerHTML = `
    <div style="margin-bottom:12px">
      <div style="font-size:11px;color:var(--txt3);margin-bottom:5px">${currentType} · ${title||'(제목 없음)'}</div>
      <div class="overall">
        <div><div class="ov-label">종합 판정</div><div style="font-size:11px;color:var(--txt3);margin-top:2px">위험 ${dangers}개 · 주의 ${warns}개</div></div>
        <div style="display:flex;align-items:center;gap:10px">
          <div class="ov-score ${overall.cls}">${overall.score}</div>
          <div class="ov-tag" style="${overall.tagbg}">${overall.tag}</div>
        </div>
      </div>
    </div>
    ${results.map(r=>`
      <div class="check-item">
        <div class="ci-left">
          <div class="ci-ico">${r.ico}</div>
          <div class="ci-result ${r.level==='ok'?'cr-ok':r.level==='warn'?'cr-warn':'cr-danger'}">${r.level==='ok'?'안전':r.level==='warn'?'주의':'위험'}</div>
        </div>
        <div class="ci-right">
          <div class="ci-name">${r.name}</div>
          <div class="ci-desc">${r.result_desc}</div>
          ${r.fix?`<div class="ci-fix">수정 제안: ${r.fix}</div>`:''}
        </div>
      </div>
    `).join('')}
  `;
}

function renderHistory(){
  const el = document.getElementById('history-area');
  if(!history.length){ el.innerHTML='<div class="empty">검수 기록이 없습니다</div>'; return; }
  const RV = {safe:'#22ffaa',check:'#ffcc22',warn:'#ff8822',danger:'#ff3a3a'};
  el.innerHTML = history.map(h=>`
    <div class="history-item" onclick="loadHistory('${h.id}')">
      <div class="hi-top">
        <div class="hi-type">${h.type}</div>
        <div class="hi-time">${h.time}</div>
      </div>
      <div class="hi-title">${h.title}</div>
    </div>
  `).join('');
}

function loadHistory(id){
  const item = history.find(h=>h.id===id);
  if(!item) return;
  renderResult(item.title, item.content, item.results, item.overall);
  switchTab('result', document.querySelector('.tab'));
}

function clearAll(){
  document.getElementById('inp-title').value='';
  document.getElementById('inp-content').value='';
  document.getElementById('inp-context').value='';
